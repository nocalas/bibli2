# Rebuilds the site from the Google Sheet and deploys it to GitHub Pages.
# Runs on every push, every 6 hours, and on demand (Actions tab → Run workflow).
name: Build & deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: build-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build site (fetch Sheet, enrich new books, render)
        run: node scripts/build.mjs

      # New books get their metadata + cover committed back so future builds
      # are fast and never re-hit the APIs for the same book.
      - name: Commit updated enrichment cache
        run: |
          git config user.name "biblioteca-bot"
          git config user.email "actions@github.com"
          git add data/enrichment-cache.json data/reading-state.json assets/covers
          if ! git diff --cached --quiet; then
            git commit -m "chore: update enrichment cache [skip ci]"
            git push
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
